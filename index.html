<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carousel Baseline</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
		  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div class="container mt-4">

  <h1>Carousel Baseline</h1>

  <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">

   <img src="Myimage.jpeg" alt="First picture" class="d-block w-100">
							   		    </div>
							    			<div class="carousel-item">
							    			  <img src="SecondPic.jpeg" alt="PicTwo" class="d-block w-100">
							    			</div>
											    <div class="carousel-item">
											      <img src="ThirdPic.jpeg" alt="PicThree" class="d-block w-100">
											    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

  <p class="mt-4">
    This is regular text after the carousel. If the images were overlaying text before, this layout will prevent that.
  </p>

</div>
</body>
</html>
